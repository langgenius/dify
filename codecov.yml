coverage:
  status:
    project:
      default:
        target: auto
        # Deleting covered code during refactors/migrations must not regress base.
        removed_code_behavior: adjust_base

flags:
  web:
    paths:
      - "web/"
    carryforward: true

  dify-ui:
    paths:
      - "packages/dify-ui/"
    carryforward: true

  api:
    paths:
      - "api/"
    carryforward: true

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dify-vdb-qdrant"
version = "1.13.3"
requires-python = "~=3.12.0"
dependencies = [
    "qdrant-client==1.9.0",
]
description = "Dify vector store backend (dify-vdb-qdrant)."

[project.entry-points."dify.vector_backends"]
qdrant = "dify_vdb_qdrant.qdrant_vector:QdrantVectorFactory"

[tool.setuptools.packages.find]
where = ["src"]

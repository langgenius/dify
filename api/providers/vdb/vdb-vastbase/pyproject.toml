[project]
name = "dify-vdb-vastbase"
version = "0.0.1"

dependencies = [
    "pyobvector~=0.2.17",
]
description = "Dify vector store backend (dify-vdb-vastbase)."

[project.entry-points."dify.vector_backends"]

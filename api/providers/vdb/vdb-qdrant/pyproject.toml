[project]
name = "dify-vdb-qdrant"
version = "0.0.1"

dependencies = [
    "qdrant-client==1.9.0",
]
description = "Dify vector store backend (dify-vdb-qdrant)."

[project.entry-points."dify.vector_backends"]
qdrant = "dify_vdb_qdrant.qdrant_vector:QdrantVectorFactory"

[tool.setuptools.packages.find]
where = ["src"]

app:
  name: generated_simple_chat
  mode: advanced-chat
  description: Simple advanced-chat example generated from a compact spec.
workflow:
  sequence:
    - id: start
      type: start
    - id: llm_main
      type: llm
      provider: openai
      model: gpt-4o-mini
      system_prompt: You are a helpful assistant.
      user_prompt: "{{#sys.query#}}"
    - id: answer
      type: answer
      answer: "{{#llm_main.text#}}"

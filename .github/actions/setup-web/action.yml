name: Setup Web Environment

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@20553a7a7429c429a74894104a2835d7fed28a72 # v1.3.0
      with:
        node-version-file: .nvmrc
        cache: true
        run-install: true
    - name: Ensure web CLAUDE.md exists
      shell: bash
      working-directory: ./web
      run: |
        if [[ ! -f CLAUDE.md ]]; then
          git show HEAD:web/CLAUDE.md > CLAUDE.md
        fi

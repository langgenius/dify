name: Setup Web Environment

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@fd19e0626188613eec92a77e875180c6445b56ba # v1.2.0
      with:
        node-version-file: web/.nvmrc
        cache: true
        cache-dependency-path: web/pnpm-lock.yaml
        run-install: |
          cwd: ./web

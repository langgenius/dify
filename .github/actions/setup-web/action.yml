name: Setup Web Environment

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@4a524139920f87f9f7080d3b8545acac019e1852 # v1.0.0
      with:
        node-version-file: "./web/.nvmrc"
        cache: true
        run-install: |
          - cwd: ./web
            args: ['--frozen-lockfile']

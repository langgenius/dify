name: Setup Web Environment

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: hyoban/setup-vp@7f4d9186789ba176e3c16dc339388459b54d8d0a # v1.2.0
      with:
        node-version-file: web/.nvmrc
        cache: true
        cache-dependency-path: web/pnpm-lock.yaml
        run-install: |
          cwd: ./web

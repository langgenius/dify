name: Setup Web Environment

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@906b5821fc79472a80264736a266e06643cca1fc # v1
      with:
        node-version-file: web/.nvmrc
        cache: true
        cache-dependency-path: web/pnpm-lock.yaml
        run-install: |
          cwd: ./web

name: Comment with Pyrefly Diff

on:
  workflow_run:
    workflows:
      - Pyrefly Diff Check
    types:
      - completed

permissions: {}

jobs:
  comment:
    name: Comment PR with pyrefly diff
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download pyrefly diff artifact
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const match = artifacts.data.artifacts.find((artifact) =>
              artifact.name === 'pyrefly_diff'
            );
            if (!match) {
              throw new Error('pyrefly_diff artifact not found');
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('pyrefly_diff.zip', Buffer.from(download.data));

      - name: Unzip artifact
        run: unzip -o pyrefly_diff.zip

      - name: Post comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let diff = fs.readFileSync('pyrefly_diff.txt', { encoding: 'utf8' });
            let prNumber = null;
            let prHeadRepo = null;
            let prBaseRepo = null;
            try {
              prNumber = parseInt(fs.readFileSync('pr_number.txt', { encoding: 'utf8' }), 10);
            } catch (err) {
              // Ignore and fallback to workflow_run payload or commit lookup.
            }
            const prs = context.payload.workflow_run.pull_requests || [];
            if (!prNumber && prs.length > 0 && prs[0].number) {
              prNumber = prs[0].number;
            }
            if (prs.length > 0) {
              prHeadRepo = prs[0].head?.repo?.full_name || null;
              prBaseRepo = prs[0].base?.repo?.full_name || null;
            }
            if (!prNumber) {
              const headSha = context.payload.workflow_run.head_sha;
              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: headSha,
              });
              const [pr] = associated.data || [];
              if (pr?.number) {
                prNumber = pr.number;
                prHeadRepo = pr.head?.repo?.full_name || prHeadRepo;
                prBaseRepo = pr.base?.repo?.full_name || prBaseRepo;
              }
            }
            if (!prNumber) {
              throw new Error('PR number not found in artifact or workflow_run payload');
            }
            // Avoid duplicate comments for same-repo PRs (handled in pyrefly-diff.yml).
            if (prHeadRepo && prBaseRepo && prHeadRepo === prBaseRepo) {
              console.log('Skipping comment for same-repo PR; handled in pyrefly-diff.yml');
              return;
            }

            const MAX_CHARS = 65000;
            if (diff.length > MAX_CHARS) {
              diff = diff.slice(0, MAX_CHARS);
              diff = diff.slice(0, diff.lastIndexOf('\\n'));
              diff += '\\n\\n... (truncated) ...';
            }

            const body = diff.trim()
              ? '### Pyrefly Diff\n<details>\n<summary>base → PR</summary>\n\n```diff\n' + diff + '\n```\n</details>'
              : '### Pyrefly Diff\nNo changes detected.';

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

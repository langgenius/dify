name: CLI Release

on:
  workflow_dispatch:

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: pack (${{ matrix.target }})
    if: github.repository == 'langgenius/dify'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runs-on: depot-ubuntu-24.04
          - target: linux-arm64
            runs-on: ubuntu-24.04-arm
          - target: darwin-x64
            runs-on: macos-13
          - target: darwin-arm64
            runs-on: macos-14
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ./cli

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup web environment
        uses: ./.github/actions/setup-web

      - name: Read cli/package.json
        id: manifest
        run: |
          version=$(node -p "require('./package.json').version")
          channel=$(node -p "require('./package.json').difyctl.channel")
          minDify=$(node -p "require('./package.json').difyctl.compat.minDify")
          maxDify=$(node -p "require('./package.json').difyctl.compat.maxDify")
          {
              echo "version=$version"
              echo "channel=$channel"
              echo "minDify=$minDify"
              echo "maxDify=$maxDify"
          } >> "$GITHUB_OUTPUT"

      - name: Validate manifest
        run: scripts/release-validate-manifest.sh

      - name: Build cli
        env:
          DIFYCTL_VERSION: ${{ steps.manifest.outputs.version }}
          DIFYCTL_CHANNEL: ${{ steps.manifest.outputs.channel }}
          DIFYCTL_MIN_DIFY: ${{ steps.manifest.outputs.minDify }}
          DIFYCTL_MAX_DIFY: ${{ steps.manifest.outputs.maxDify }}
        run: |
          DIFYCTL_COMMIT="$(git rev-parse HEAD)" \
          DIFYCTL_BUILD_DATE="$(git log -1 --format=%cI HEAD)" \
            pnpm build

      - name: Pack tarball (${{ matrix.target }})
        env:
          CLI_VERSION: ${{ steps.manifest.outputs.version }}
          PACK_TARGET: ${{ matrix.target }}
        run: pnpm pack:tarballs

      - name: Upload per-target tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: difyctl-${{ steps.manifest.outputs.version }}-${{ matrix.target }}
          path: cli/dist/difyctl-v*-${{ matrix.target }}.tar.xz
          retention-days: 7
          if-no-files-found: error

  bundle:
    name: bundle release artifact
    needs: pack
    if: github.repository == 'langgenius/dify'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ./cli

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read manifest version
        id: manifest
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download per-target tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli/dist
          pattern: difyctl-${{ steps.manifest.outputs.version }}-*
          merge-multiple: true

      - name: Generate sha256 checksum file
        env:
          CLI_VERSION: ${{ steps.manifest.outputs.version }}
        run: scripts/release-write-checksums.sh

      - name: Upload combined release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: difyctl-${{ steps.manifest.outputs.version }}
          path: |
            cli/dist/difyctl-v*.tar.xz
            cli/dist/difyctl-v*-checksums.txt
          retention-days: 90
          if-no-files-found: error

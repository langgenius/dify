name: Company Release Images

on:
  push:
    tags:
      - 'v*'
      - 'company-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag or branch/SHA to build
        required: true
        type: string
      publish_latest:
        description: Also publish latest tags
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: company-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-images:
    name: Build ${{ matrix.component }} image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: api/Dockerfile
            image: dify-api
          - component: web
            dockerfile: web/Dockerfile
            image: dify-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve version
        id: version
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest || false }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          SAFE_VERSION="$(printf '%s' "$VERSION" | tr '/' '-')"
          echo "version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${SAFE_VERSION}"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "$PUBLISH_LATEST" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Building version: $SAFE_VERSION"
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=release-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.component }}

  release-notes:
    name: Create GitHub Release
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Company Dify Images

            - API: `ghcr.io/${{ github.repository_owner }}/dify-api:${{ github.ref_name }}`
            - Web: `ghcr.io/${{ github.repository_owner }}/dify-web:${{ github.ref_name }}`

            部署生产前请确认 staging 验证、数据库迁移兼容性和回滚版本。

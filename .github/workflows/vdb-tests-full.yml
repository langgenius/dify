name: Run Full VDB Tests

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vdb-tests-full-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Full VDB Tests
    if: github.repository == 'langgenius/dify'
    runs-on: depot-ubuntu-24.04
    strategy:
      matrix:
        python-version:
          - "3.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: api/uv.lock

      - name: Check UV lockfile
        run: uv lock --project api --check

      - name: Install dependencies
        run: uv sync --project api --dev

#      - name: Set up Vector Store (TiDB)
#        uses: hoverkraft-tech/compose-action@v2.0.2
#        with:
#          compose-file: docker/tidb/docker-compose.yaml
#          services: |
#            tidb
#            tiflash


#      - name: Check VDB Ready (TiDB)
#        run: uv run --project api python api/providers/vdb/tidb-vector/tests/integration_tests/check_tiflash_ready.py

      - name: Test Vector Stores
        run: |
          uv run --project api pytest \
            --start-vdb \
            --vdb-services "weaviate,qdrant,couchbase-server,etcd,minio,milvus-standalone,pgvecto-rs,pgvector,chroma,elasticsearch,oceanbase,valkey" \
            --timeout "${PYTEST_TIMEOUT:-180}" \
            api/providers/vdb/*/tests/integration_tests

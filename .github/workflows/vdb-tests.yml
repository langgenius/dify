name: Run VDB Smoke Tests

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: vdb-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: VDB Smoke Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: api/uv.lock

      - name: Check UV lockfile
        run: uv lock --project api --check

      - name: Install dependencies
        run: uv sync --project api --dev

      - name: Set up dotenvs
        run: |
          cp docker/.env.example docker/.env
          cp docker/middleware.env.example docker/middleware.env
          python3 - <<'PY'
          import pathlib
          import secrets
          import string

          env_path = pathlib.Path("docker/.env")
          if not env_path.is_file():
            raise SystemExit("docker/.env not found")

          required_secret_vars = {
            "SECRET_KEY",
            "DB_PASSWORD",
            "REDIS_PASSWORD",
            "PLUGIN_DIFY_INNER_API_KEY",
            "MINIO_SECRET_KEY",
          }

          alphabet = string.ascii_letters + string.digits
          replacement = {k: "".join(secrets.choice(alphabet) for _ in range(48)) for k in required_secret_vars}

          lines = env_path.read_text(encoding="utf-8").splitlines()
          updated = []
          found = set()
          for line in lines:
            if "=" not in line or line.lstrip().startswith("#"):
              updated.append(line)
              continue
            key, value = line.split("=", 1)
            if key in replacement and not value.strip():
              updated.append(f"{key}={replacement[key]}")
              found.add(key)
            else:
              updated.append(line)

          missing = required_secret_vars - found
          if missing:
            raise SystemExit(f"Required secret vars missing or non-empty not found in docker/.env: {sorted(missing)}")

          env_path.write_text("\n".join(updated) + "\n", encoding="utf-8")
          PY

      - name: Expose Service Ports
        run: sh .github/workflows/expose_service_ports.sh

#      - name: Set up Vector Store (TiDB)
#        uses: hoverkraft-tech/compose-action@v2.0.2
#        with:
#          compose-file: docker/tidb/docker-compose.yaml
#          services: |
#            tidb
#            tiflash

      - name: Set up Vector Stores for Smoke Coverage
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
        with:
          compose-file: |
            docker/docker-compose.yaml
          services: |
            db_postgres
            redis
            weaviate
            qdrant
            pgvector
            chroma

      - name: setup test config
        run: |
          echo $(pwd)
          ls -lah .
          cp api/tests/integration_tests/.env.example api/tests/integration_tests/.env

#      - name: Check VDB Ready (TiDB)
#        run: uv run --project api python api/tests/integration_tests/vdb/tidb_vector/check_tiflash_ready.py

      - name: Test Vector Stores
        run: |
          uv run --project api pytest --timeout "${PYTEST_TIMEOUT:-180}" \
            api/tests/integration_tests/vdb/chroma \
            api/tests/integration_tests/vdb/pgvector \
            api/tests/integration_tests/vdb/qdrant \
            api/tests/integration_tests/vdb/weaviate

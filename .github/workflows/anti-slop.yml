name: Anti-Slop PR Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@57858eead489d08b255fab2af45a506c2ca6eab2 # v0.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          close-pr: false
          failure-add-pr-labels: "needs-revision"

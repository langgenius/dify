version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      uv-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/web"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      uv-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    ignore:
      - package-name: "@sentry/react"
        update-types: ["version-update:semver-major"]
      - package-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - package-name: "echarts"
        update-types: ["version-update:semver-major"]
      - package-name: "uuid"
        update-types: ["version-update:semver-major"]
      - package-name: "react-markdown"
        update-types: ["version-update:semver-major"]
      - package-name: "react-syntax-highlighter"
        update-types: ["version-update:semver-major"]
      - package-name: "react-window"
        update-types: ["version-update:semver-major"]
    groups:
      lexical:
        patterns:
          - "lexical"
          - "@lexical/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "lexical"
          - "@lexical/*"
          - "storybook"
          - "@storybook/*"

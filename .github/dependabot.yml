version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
      flask:
        patterns:
          - "flask*"
          - "werkzeug"
          - "gunicorn"
      google-cloud:
        patterns:
          - "google-*"
          - "googleapis-*"
      pydantic:
        patterns:
          - "pydantic*"
      aws:
        patterns:
          - "boto3"
          - "botocore"
      postgres:
        patterns:
          - "psyco*"
          - "sqlalchemy"
      python-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/api"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
      flask:
        patterns:
          - "flask*"
          - "werkzeug"
          - "gunicorn"
      google-cloud:
        patterns:
          - "google-*"
          - "googleapis-*"
      pydantic:
        patterns:
          - "pydantic*"
      aws:
        patterns:
          - "boto3"
          - "botocore"
      postgres:
        patterns:
          - "psyco*"
          - "sqlalchemy"
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

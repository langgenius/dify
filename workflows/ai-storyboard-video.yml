        tool_configurations: {}
        tool_parameters:
          action:
            type: mixed
            value: image2video
          prompt:
            type: mixed
            value: 'Extract SCENE1_VIDEO_PROMPT from: {{#extract_urls_llm.text#}}'
          start_image_url:
            type: mixed
            value: 'Extract SCENE1_URL from: {{#extract_urls_llm.text#}}'
      height: 90

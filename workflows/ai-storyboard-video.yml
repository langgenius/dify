        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
        prompt_template:
        - role: system
          text: 'You are a video production assistant. Present a beautiful summary of the completed storyboard video production.


            Include:

            1. The original storyboard (with narration for each scene)

            2. Generated image URLs for each scene

            3. Generated video URLs/IDs for each scene

            4. Suggested order for final editing


            Format in markdown with clear sections. Use the original language for narrations.

            '
        - role: user
          text: 'Story concept: {{#start_node.story_concept#}}


            Storyboard script:

            {{#storyboard_llm.text#}}


            Extracted URLs and prompts:

            {{#extract_urls_llm.text#}}


            Video 1 result: {{#video1_luma.text#}}

            Video 2 result: {{#video2_luma.text#}}

            Video 3 result: {{#video3_luma.text#}}

            Video 4 result: {{#video4_luma.text#}}


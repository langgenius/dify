app:
  description: Enter a one-line concept, such as "The life of Zuo Zongtang", and let AI generate a storyboard script, create images for each scene, and then turn those images into video clips.
  icon: 🎬
  icon_background: '#FFE4DE'
  mode: workflow
  name: AI Storyboard Video
  use_icon_as_answer_icon: false
dependencies:
- type: marketplace
  value:
    marketplace_plugin_unique_identifier: acedatacloud/flux
- type: marketplace
  value:
    marketplace_plugin_unique_identifier: acedatacloud/kling
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: llm
      id: start-to-storyboard
      source: start_node
      sourceHandle: source
      target: storyboard_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: tool
      id: storyboard-to-scene1
      source: storyboard_llm
      sourceHandle: source
      target: scene1_image
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: scene1-to-scene2
      source: scene1_image
      sourceHandle: source
      target: scene2_image
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: scene2-to-scene3
      source: scene2_image
      sourceHandle: source
      target: scene3_image
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: scene3-to-scene4
      source: scene3_image
      sourceHandle: source
      target: scene4_image
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: llm
      id: scene4-to-extract
      source: scene4_image
      sourceHandle: source
      target: extract_urls_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: tool
      id: extract-to-video1
      source: extract_urls_llm
      sourceHandle: source
      target: video1_luma
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: video1-to-video2
      source: video1_luma
      sourceHandle: source
      target: video2_luma
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: video2-to-video3
      source: video2_luma
      sourceHandle: source
      target: video3_luma
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: tool
      id: video3-to-video4
      source: video3_luma
      sourceHandle: source
      target: video4_luma
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: tool
        targetType: llm
      id: video4-to-summary
      source: video4_luma
      sourceHandle: source
      target: summary_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: end
      id: summary-to-end
      source: summary_llm
      sourceHandle: source
      target: end_node
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: ''
        selected: false
        title: Start
        type: start
        variables:
        - label: Story Topic
          max_length: 2000
          options: []
          required: true
          type: text-input
          variable: story_concept
        - label: Visual Style
          max_length: 200
          options:
          - Cinematic Realism
          - Chinese Ink Painting
          - Anime Style
          - Oil Painting Style
          - Cyberpunk
          required: false
          type: select
          variable: visual_style
      height: 90
      id: start_node
      position:
        x: 30
        y: 300
      positionAbsolute:
        x: 30
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Generate four storyboard scenes from the story topic
        title: Storyboard Writer
        type: llm
        model:
          provider: openai
          name: gpt-4o
          mode: chat
        prompt_template:
        - role: system
          text: 'You are a professional storyboard director. Given a story concept, create exactly 4 scenes for a short video storyboard.


            For each scene, provide:

            1. A detailed visual description for image generation (in English, optimized for Flux AI image generator)

            2. A short camera movement description for video generation

            3. A brief narrative text (in the story''s original language)


            Output in this EXACT format (no other text):


            SCENE 1:

            IMAGE_PROMPT: <detailed English prompt for image generation, include style, lighting, composition, colors>

            CAMERA: <camera movement description, e.g. "slow zoom in", "pan left to right", "aerial tracking shot">

            NARRATION: <narrative text in original language>


            SCENE 2:

            IMAGE_PROMPT: <...>

            CAMERA: <...>

            NARRATION: <...>


            SCENE 3:

            IMAGE_PROMPT: <...>

            CAMERA: <...>

            NARRATION: <...>


            SCENE 4:

            IMAGE_PROMPT: <...>

            CAMERA: <...>

            NARRATION: <...>


            Make scenes tell a coherent story arc: setup → development → climax → resolution.

            Visual style to incorporate: {{#start_node.visual_style#}}

            '
        - role: user
          text: '{{#start_node.story_concept#}}'
        vision:
          enabled: false
          configs:
            variable_selector: []
        memory:
          enabled: false
          window:
            enabled: false
            size: 50
        context:
          enabled: false
          variable_selector: []
        structured_output:
          enabled: false
        retry_config:
          enabled: false
          max_retries: 1
          retry_interval: 1000
          exponential_backoff:
            enabled: false
            multiplier: 2
            max_interval: 10000
      height: 90
      id: storyboard_llm
      position:
        x: 334
        y: 300
      positionAbsolute:
        x: 334
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Generate the image for scene 1
        title: Scene 1 Image
        type: tool
        provider_id: acedatacloud/flux
        provider_type: plugin
        provider_name: flux
        tool_name: flux_generate_image
        tool_label: Flux Generate Image
        tool_configurations: {}
        tool_parameters:
          prompt:
            type: mixed
            value: 'Extract SCENE 1 IMAGE_PROMPT from: {{#storyboard_llm.text#}}'
          model:
            type: mixed
            value: flux-pro-1.1
          size:
            type: mixed
            value: 1920x1080
      height: 90
      id: scene1_image
      position:
        x: 638
        y: 100
      positionAbsolute:
        x: 638
        y: 100
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Generate the image for scene 2
        title: Scene 2 Image
        type: tool
        provider_id: acedatacloud/flux
        provider_type: plugin
        provider_name: flux
        tool_name: flux_generate_image
        tool_label: Flux Generate Image
        tool_configurations: {}
        tool_parameters:
          prompt:
            type: mixed
            value: 'Extract SCENE 2 IMAGE_PROMPT from: {{#storyboard_llm.text#}}'
          model:
            type: mixed
            value: flux-pro-1.1
          size:
            type: mixed
            value: 1920x1080
      height: 90
      id: scene2_image
      position:
        x: 638
        y: 250
      positionAbsolute:
        x: 638
        y: 250
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Generate the image for scene 3
        title: Scene 3 Image
        type: tool
        provider_id: acedatacloud/flux
        provider_type: plugin
        provider_name: flux
        tool_name: flux_generate_image
        tool_label: Flux Generate Image
        tool_configurations: {}
        tool_parameters:
          prompt:
            type: mixed
            value: 'Extract SCENE 3 IMAGE_PROMPT from: {{#storyboard_llm.text#}}'
          model:
            type: mixed
            value: flux-pro-1.1
          size:
            type: mixed
            value: 1920x1080
      height: 90
      id: scene3_image
      position:
        x: 638
        y: 400
      positionAbsolute:
        x: 638
        y: 400
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Generate the image for scene 4
        title: Scene 4 Image
        type: tool
        provider_id: acedatacloud/flux
        provider_type: plugin
        provider_name: flux
        tool_name: flux_generate_image
        tool_label: Flux Generate Image
        tool_configurations: {}
        tool_parameters:
          prompt:
            type: mixed
            value: 'Extract SCENE 4 IMAGE_PROMPT from: {{#storyboard_llm.text#}}'
          model:
            type: mixed
            value: flux-pro-1.1
          size:
            type: mixed
            value: 1920x1080
      height: 90
      id: scene4_image
      position:
        x: 638
        y: 550
      positionAbsolute:
        x: 638
        y: 550
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: Extract URLs and video prompts from the generated image results
        title: Extract Image URLs
        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
        prompt_template:
        - role: system
          text: 'You receive storyboard info and 4 scene image generation results. Extract the image_url from each scene''s result data and pair it with a video motion prompt based on the CAMERA direction
            in the storyboard.


            Output EXACTLY in this format:

            SCENE1_URL: <url>

            SCENE1_VIDEO_PROMPT: <motion/camera prompt for video generation>

            SCENE2_URL: <url>

            SCENE2_VIDEO_PROMPT: <motion/camera prompt>

            SCENE3_URL: <url>

            SCENE3_VIDEO_PROMPT: <motion/camera prompt>

            SCENE4_URL: <url>

            SCENE4_VIDEO_PROMPT: <motion/camera prompt>

            '
        - role: user
          text: 'Storyboard:

            {{#storyboard_llm.text#}}


            Scene 1 Result:

            {{#scene1_image.text#}}


            Scene 2 Result:

            {{#scene2_image.text#}}


            Scene 3 Result:

            {{#scene3_image.text#}}


            Scene 4 Result:

            {{#scene4_image.text#}}

            '
        vision:
          enabled: false
          configs:
            variable_selector: []
        memory:
          enabled: false
          window:
            enabled: false
            size: 50
        context:
          enabled: false
          variable_selector: []
        structured_output:
          enabled: false
        retry_config:
          enabled: false
          max_retries: 1
          retry_interval: 1000
          exponential_backoff:
            enabled: false
            multiplier: 2
            max_interval: 10000
      height: 90
      id: extract_urls_llm
      position:
        x: 942
        y: 300
      positionAbsolute:
        x: 942

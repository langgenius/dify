identity:
  author: "acedatacloud"
  name: "serp"
  label:
    en_US: "SERP"
    zh_Hans: "SERP"
    pt_BR: "SERP"
    ja_JP: "SERP"
  description:
    en_US: "Fetch Google SERP results via Ace Data Cloud Google SERP API."
    zh_Hans: "通过 Ace Data Cloud Google SERP API 获取 Google 搜索结果。"
    pt_BR: "Busque resultados SERP do Google via Ace Data Cloud Google SERP API."
